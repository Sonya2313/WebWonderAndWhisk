<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <main class="profile-page">
      <section class="profile-hero">
        <div class="profile-overlay"></div>

        <div class="profile-shell">
          <a
            href="./index.html"
            class="profile-logo"
            aria-label="Wonder and Whisk home"
          >
            <img src="./assets/logo.svg" alt="Wonder and Whisk" />
          </a>

          <section class="login-card" aria-labelledby="login-title">
            <div class="login-decor" aria-hidden="true">🥐</div>

            <h1 id="login-title" class="login-title" data-i18n="memberLogin">
              MEMBER LOGIN
            </h1>

            <form class="login-form">
              <label class="sr-only" for="email">Email</label>
              <input
                id="email"
                type="email"
                class="login-input"
                data-i18n-placeholder="emailAddress"
                placeholder="EMAIL ADDRESS"
              />

              <label class="sr-only" for="login-name">Login</label>
              <input
                id="login-name"
                type="text"
                class="login-input"
                data-i18n-placeholder="login"
                placeholder="LOGIN"
              />

              <label class="sr-only" for="password">Password</label>
              <input
                id="password"
                type="password"
                class="login-input"
                data-i18n-placeholder="password"
                placeholder="PASSWORD"
              />

              <button type="submit" class="login-button" data-i18n="signIn">
                SIGN IN
              </button>
            </form>

            <p class="login-footer-text">
              <span data-i18n="notMember">NOT A MEMBER?</span>
              <a href="#" class="login-link" data-i18n="signUpNow"
                >SIGN UP NOW</a
              >
            </p>
          </section>
        </div>
      </section>
    </main>
    <script type="module" src="classes.js"></script>
  </body>
</html>
