<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorites</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="favorites.css" />
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="nav-left">
          <a href="./index.html" class="nav-icon-link" aria-label="Home">⌂</a>
          <a href="./cart.html" class="nav-icon-link" aria-label="Cart">🛒</a>
          <span id="cart-counter">0</span>
        </div>
        <a
          href="./index.html"
          class="nav-logo"
          aria-label="Wonder and Whisk home"
        >
          <img class="logo" src="./assets/logo.svg" alt="Wonder and Whisk" />
        </a>
        <div class="nav-right">
          <a href="/profile.html" class="profile-link" target="_blank">
            <span id="profile-link-text" data-i18n="profile">PROFILE</span>
            <svg
              class="profile-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              aria-hidden="true"
            >
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M4 20c1.8-3.5 5-5 8-5s6.2 1.5 8 5"></path>
            </svg>
          </a>

          <select
            id="language-select"
            class="language-select"
            aria-label="Language"
          >
            <option value="en">ENG</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </nav>
    </header>
    <main class="main">
      <section class="hero">
        <h1 class="main-text">Favorites</h1>
      </section>

      <section id="favorites-list" class="favorites-list"></section>
    </main>

    <script type="module" src="favorites.js"></script>
  </body>
</html>
