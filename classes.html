<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master-classes</title>
    <link rel="stylesheet" href="classes.css" />
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="nav-left">
          <a href="./index.html" class="nav-icon-link" aria-label="Home">⌂</a>
          <a href="./cart.html" class="nav-icon-link" aria-label="Cart">🛒</a>
          <a
            href="./favorites.html"
            class="nav-icon-link heart"
            aria-label="Favorites"
            >♥</a
          >
        </div>
        <a
          href="./index.html"
          class="nav-logo"
          aria-label="Wonder and Whisk home"
        >
          <img class="logo" src="./assets/logo.svg" alt="Wonder and Whisk" />
        </a>
        <div class="nav-right">
          <a href="/profile.html" class="profile-link" target="_blank">
            <span id="profile-link-text" data-i18n="profile">PROFILE</span>
            <svg
              class="profile-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              aria-hidden="true"
            >
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M4 20c1.8-3.5 5-5 8-5s6.2 1.5 8 5"></path>
            </svg>
          </a>

          <select
            id="language-select"
            class="language-select"
            aria-label="Language"
          >
            <option value="en">ENG</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </nav>
    </header>
    <main class="main">
      <section class="hero">
        <p class="hero-top-text">DISCOVER PASTRY</p>
        <h1 class="hero-main-text">Master-Classes</h1>
        <p class="hero-bottom-text">THAT TURN PRACTICE INTO WONDER</p>
      </section>

      <section class="controls">
        <select id="class-filter" class="controls-select">
          <option value="" selected disabled hidden>Categories</option>
          <option value="all">All</option>
          <option value="cakes">Cakes</option>
          <option value="buns">Buns</option>
          <option value="cheesecakes">Cheesecakes</option>
          <option value="tarts">tarts</option>
        </select>

        <select id="sorting" class="controls-select">
          <option value="" selected disabled hidden>Sorting</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="popularity">By popularity</option>
        </select>

        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <input
            type="search"
            id="search"
            class="controls-select"
            placeholder="Search master-class"
          />
        </div>
      </section>

      <section id="classes-list" class="classes"></section>
    </main>
    <dialog class="masterclass-dialog" id="masterclass-dialog">
      <form method="dialog" class="dialog-close">
        <button class="dialog-close-button" type="submit" aria-label="Close">
          ✕
        </button>
      </form>

      <div class="dialog-content">
        <div class="dialog-media">
          <img class="dialog-image" id="dialog-image" src="" alt="" />
        </div>

        <div class="dialog-info">
          <h2 class="dialog-title" id="dialog-title"></h2>

          <div class="dialog-tabs">
            <button
              type="button"
              class="dialog-tab is-active"
              data-tab="description"
            >
              DESCRIPTION
            </button>
            <button type="button" class="dialog-tab" data-tab="reviews">
              REVIEWS
            </button>
          </div>

          <div class="dialog-panel" id="description-panel">
            <p class="dialog-description" id="dialog-description"></p>
            <p class="dialog-duration" id="dialog-duration"></p>
          </div>

          <div class="dialog-panel hidden" id="reviews-panel">
            <div class="dialog-reviews" id="dialog-reviews"></div>
          </div>
        </div>
      </div>
    </dialog>
    <footer class="footer">
      <div class="footer-inner">
        <ul class="footer-links">
          <li><a href="./about.html">ABOUT US</a></li>
          <li><a href="./contact.html">CONTACT US</a></li>
          <li><a href="./payment.html">PAYMENT</a></li>
          <li><a href="./questions.html">QUESTIONS</a></li>
          <li><a href="./certificates.html">CERTIFICATES</a></li>
        </ul>

        <p class="footer-text">
          We offer hands-on pastry masterclasses for every level — from your
          first whisk to bakery-worthy creations.
        </p>
      </div>
    </footer>
    <script type="module" src="classes.js"></script>
  </body>
</html>
